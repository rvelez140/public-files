<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 768 768" width="768" height="768">
  <defs>
    <linearGradient id="bg" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7898b6"/>
      <stop offset="100%" stop-color="#c8dae8"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="768" height="768" fill="url(#bg)"/>

  <!-- Circuit icon (replacing O in SOLUCIONES) centered left area -->
  <!-- Main square -->
  <g transform="translate(148, 330)">
    <!-- Circuit traces going up -->
    <line x1="20" y1="-8" x2="20" y2="-40" stroke="#2a2a2a" stroke-width="4" stroke-linecap="round"/>
    <circle cx="20" cy="-48" r="8" fill="none" stroke="#2a2a2a" stroke-width="4"/>

    <!-- Circuit traces going left -->
    <line x1="-8" y1="20" x2="-40" y2="20" stroke="#2a2a2a" stroke-width="4" stroke-linecap="round"/>
    <circle cx="-48" cy="20" r="8" fill="none" stroke="#2a2a2a" stroke-width="4"/>

    <!-- Circuit traces going down-left -->
    <line x1="10" y1="48" x2="10" y2="72" stroke="#2a2a2a" stroke-width="4" stroke-linecap="round"/>
    <line x1="10" y1="72" x2="-20" y2="72" stroke="#2a2a2a" stroke-width="4" stroke-linecap="round"/>
    <circle cx="-28" cy="72" r="8" fill="none" stroke="#2a2a2a" stroke-width="4"/>

    <!-- Diagonal trace going right-down -->
    <line x1="48" y1="38" x2="72" y2="62" stroke="#7ec8a0" stroke-width="4" stroke-linecap="round"/>

    <!-- Center square chip -->
    <rect x="0" y="0" width="40" height="40" rx="4" fill="none" stroke="#8a6bbf" stroke-width="4"/>
    <rect x="6" y="6" width="28" height="28" rx="2" fill="none" stroke="#7ec8a0" stroke-width="3"/>
  </g>

  <!-- SOLUCIONES RV text -->
  <text x="200" y="360" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="88" fill="#1a1a1a" letter-spacing="2">SOLUCIONES RV</text>

  <!-- Subtitle -->
  <text x="200" y="410" font-family="Arial, sans-serif" font-weight="400" font-size="32" fill="#2a2a2a" letter-spacing="1">Infraestructura tecnológica inteligente</text>
</svg>
