<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 768 768" width="768" height="768">
  <defs>
    <linearGradient id="bg" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7898b6"/>
      <stop offset="100%" stop-color="#c8dae8"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="768" height="768" fill="url(#bg)"/>

  <!-- Circuit icon centered above text -->
  <g transform="translate(384, 280)">
    <!-- Circuit traces going up -->
    <line x1="0" y1="-22" x2="0" y2="-55" stroke="#1a1a1a" stroke-width="5" stroke-linecap="round"/>
    <circle cx="0" cy="-66" r="11" fill="none" stroke="#1a1a1a" stroke-width="5"/>

    <!-- Circuit traces going left -->
    <line x1="-22" y1="0" x2="-55" y2="0" stroke="#1a1a1a" stroke-width="5" stroke-linecap="round"/>
    <circle cx="-66" cy="0" r="11" fill="none" stroke="#1a1a1a" stroke-width="5"/>

    <!-- Circuit traces going down -->
    <line x1="-12" y1="22" x2="-12" y2="55" stroke="#1a1a1a" stroke-width="5" stroke-linecap="round"/>
    <line x1="-12" y1="55" x2="-40" y2="55" stroke="#1a1a1a" stroke-width="5" stroke-linecap="round"/>
    <circle cx="-51" cy="55" r="11" fill="none" stroke="#1a1a1a" stroke-width="5"/>

    <!-- Diagonal trace going right -->
    <line x1="22" y1="16" x2="52" y2="46" stroke="#7ec8a0" stroke-width="5" stroke-linecap="round"/>

    <!-- Center square chip -->
    <rect x="-20" y="-20" width="40" height="40" rx="5" fill="none" stroke="#8a6bbf" stroke-width="5"/>
    <rect x="-12" y="-12" width="24" height="24" rx="3" fill="none" stroke="#7ec8a0" stroke-width="4"/>
  </g>

  <!-- SOLUCIONES RV -->
  <text x="384" y="380" 
        font-family="Arial Black, Arial, sans-serif" 
        font-weight="900" 
        font-size="80" 
        fill="#1a1a1a" 
        letter-spacing="3"
        text-anchor="middle">SOLUCIONES RV</text>

  <!-- Subtitle -->
  <text x="384" y="425" 
        font-family="Arial, sans-serif" 
        font-weight="400" 
        font-size="28" 
        fill="#2a2a2a" 
        letter-spacing="1"
        text-anchor="middle">Infraestructura tecnológica inteligente</text>
</svg>
